<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Plan Builder — Prototype C: Section Swimlanes</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        base: '#121A1B',
        subtle: '#1E292B',
        surface: '#243335',
        raised: '#2C383A',
        overlay: '#344345',
        border: '#2C383A',
        'border-strong': '#3A4A4D',
        muted: '#666666',
        foreground: '#F5F5F5',
        primary: '#FF7D00',
        secondary: '#29757A',
        accent: '#FF7D00',
        success: '#4A7A45',
        error: '#BE3F23',
        info: '#2E5A88',
        warning: '#D99100',
        hover: '#2C383A',
      }
    }
  }
}
</script>
<style>
  body { font-family: Inter, system-ui, sans-serif; background: #121A1B; color: #F5F5F5; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #3A4A4D; border-radius: 3px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  .drag-ghost { opacity: 0.4; transform: rotate(1deg); }
  .section-drop-active { border-color: rgba(255,125,0,0.5) !important; background: rgba(255,125,0,0.03) !important; }

  /* Intensity bar */
  .intensity-bar { position: relative; height: 4px; border-radius: 2px; overflow: hidden; }
  .intensity-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* Running time indicator */
  .running-time { position: relative; }
  .running-time::before { content: ''; position: absolute; left: -8px; top: 50%; width: 4px; height: 4px; border-radius: 50%; background: #FF7D00; transform: translateY(-50%); }
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="sticky top-0 z-30 bg-base/80 backdrop-blur-lg border-b border-border">
  <div class="max-w-[1400px] mx-auto px-6 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="#" class="text-muted hover:text-foreground transition-colors">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <div>
          <input type="text" value="Game Day Prep Session" class="bg-transparent text-lg font-bold text-foreground outline-none border-b border-transparent hover:border-border focus:border-primary/50 transition-all w-[320px]" />
        </div>
      </div>

      <!-- Time Budget (always visible) -->
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-3 bg-surface/80 rounded-xl px-4 py-2 border border-border">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-muted"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div class="flex items-center gap-1.5">
            <span id="usedTime" class="text-lg font-bold text-foreground">0</span>
            <span class="text-sm text-muted">/</span>
            <select id="targetTime" class="bg-transparent text-sm text-muted outline-none cursor-pointer" onchange="renderAll()">
              <option value="60">60m</option>
              <option value="90" selected>90m</option>
              <option value="120">120m</option>
            </select>
          </div>
          <div class="w-24 h-2 rounded-full bg-subtle overflow-hidden">
            <div id="progressBar" class="h-full rounded-full bg-accent transition-all duration-500" style="width:0%"></div>
          </div>
          <span id="remainLabel" class="text-xs text-muted font-medium">90m left</span>
        </div>

        <div class="flex items-center gap-2">
          <button class="px-3 py-1.5 rounded-lg text-sm text-muted border border-border hover:text-foreground hover:border-border-strong transition-all">Cancel</button>
          <button class="px-4 py-1.5 rounded-lg text-sm font-medium bg-primary text-white hover:brightness-110 transition-all flex items-center gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-6">

  <!-- Intensity Overview -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="rounded-xl bg-surface/80 p-4 border border-border">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium text-muted uppercase tracking-wider">Intensity Curve</span>
        <span class="text-xs text-muted" id="avgIntensity">—</span>
      </div>
      <div class="flex items-end gap-0.5 h-8" id="intensityChart"></div>
    </div>
    <div class="rounded-xl bg-surface/80 p-4 border border-border">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium text-muted uppercase tracking-wider">Category Mix</span>
      </div>
      <div class="flex gap-1 h-8 items-end" id="categoryChart"></div>
    </div>
    <div class="rounded-xl bg-surface/80 p-4 border border-border">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium text-muted uppercase tracking-wider">Skills Covered</span>
      </div>
      <div class="flex flex-wrap gap-1" id="skillsCovered"></div>
    </div>
  </div>

  <!-- Section Swimlanes -->
  <div class="space-y-4" id="sectionsContainer"></div>

  <!-- Add Section Button -->
  <button onclick="addSection()" class="w-full mt-4 p-4 rounded-xl border-2 border-dashed border-border hover:border-primary/30 text-muted hover:text-primary transition-all flex items-center justify-center gap-2 text-sm font-medium">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Section
  </button>
</main>

<!-- Drill Picker Modal -->
<div id="drillModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDrillModal()"></div>
  <div class="absolute right-0 top-0 bottom-0 w-[440px] bg-overlay/95 backdrop-blur-xl shadow-2xl flex flex-col">
    <div class="p-5 border-b border-border">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-foreground">Add Drills</h3>
        <button onclick="closeDrillModal()" class="p-1.5 rounded-lg hover:bg-hover text-muted hover:text-foreground transition-colors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 text-muted" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="modalSearch" placeholder="Search drills..." class="w-full pl-8 pr-3 py-2 rounded-lg bg-subtle/50 border border-border text-foreground text-sm placeholder:text-muted/50 focus:border-primary/50 outline-none transition-all" oninput="renderModalDrills()" />
      </div>
    </div>
    <!-- Category Tabs -->
    <div class="px-5 py-2.5 flex gap-1 overflow-x-auto scrollbar-thin border-b border-border" id="modalCatTabs"></div>
    <!-- Drill List -->
    <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-thin" id="modalDrillList"></div>
  </div>
</div>

<!-- Duration Edit Inline -->
<div id="durEdit" class="fixed bg-raised/95 backdrop-blur-lg shadow-lg rounded-xl border border-border p-3 z-50 hidden" style="min-width:200px">
  <label class="block text-xs text-muted mb-1.5">Duration (min)</label>
  <div class="flex items-center gap-1.5">
    <button class="w-7 h-7 rounded-lg bg-subtle border border-border text-foreground hover:bg-hover flex items-center justify-center text-xs" onclick="adjDur(-5)">-5</button>
    <input type="number" id="durInput" class="flex-1 px-2 py-1 rounded-lg bg-subtle/50 border border-border text-foreground text-sm text-center focus:border-primary/50 outline-none" min="1" />
    <button class="w-7 h-7 rounded-lg bg-subtle border border-border text-foreground hover:bg-hover flex items-center justify-center text-xs" onclick="adjDur(5)">+5</button>
  </div>
  <div class="flex gap-1.5 mt-2">
    <button class="flex-1 px-2 py-1 rounded-lg text-[11px] font-medium text-muted border border-border hover:text-foreground transition-all" onclick="closeDurEdit()">Cancel</button>
    <button class="flex-1 px-2 py-1 rounded-lg text-[11px] font-medium bg-primary text-white hover:brightness-110 transition-all" onclick="saveDurEdit()">Save</button>
  </div>
</div>

<script>
const CATEGORIES = ['Warmup','Technical','Tactical','Game','Conditioning','Cooldown'];
const CATEGORY_COLORS = { Warmup:'#29757A', Technical:'#2E5A88', Tactical:'#FF7D00', Game:'#D99100', Conditioning:'#BE3F23', Cooldown:'#4A7A45' };
const INTENSITY_COLORS = { Low:'#4A7A45', Medium:'#D99100', High:'#BE3F23' };
const INTENSITY_VAL = { Low: 1, Medium: 2, High: 3 };

const MOCK_DRILLS = [
  { id:'d1', name:'Dynamic Stretching', duration:10, category:'Warmup', intensity:'Low', skills:['Conditioning','Footwork'], description:'Full-body dynamic stretch routine' },
  { id:'d2', name:'Pepper Drill', duration:8, category:'Warmup', intensity:'Low', skills:['Passing','Setting','Attacking'], description:'Partner warm-up drill' },
  { id:'d3', name:'Serve Receive Lines', duration:15, category:'Technical', intensity:'Medium', skills:['Serving','Passing'], description:'Serve receive with platform focus' },
  { id:'d4', name:'Setting Accuracy', duration:12, category:'Technical', intensity:'Medium', skills:['Setting'], description:'Targeted setting to zones 2 and 4' },
  { id:'d5', name:'Attacking Approach', duration:15, category:'Technical', intensity:'High', skills:['Attacking','Footwork'], description:'Three-step approach with timing' },
  { id:'d6', name:'Block & Recover', duration:12, category:'Technical', intensity:'High', skills:['Blocking','Defense'], description:'Block then transition to defense' },
  { id:'d7', name:'6v6 Controlled', duration:20, category:'Tactical', intensity:'Medium', skills:['Serving','Passing','Setting','Attacking'], description:'Full game with tactical constraints' },
  { id:'d8', name:'Transition Offense', duration:15, category:'Tactical', intensity:'High', skills:['Attacking','Setting','Defense'], description:'Dig-set-attack sequences' },
  { id:'d9', name:'King of the Court', duration:20, category:'Game', intensity:'High', skills:['Serving','Passing','Attacking'], description:'Competitive rotational game' },
  { id:'d10', name:'Suicide Sprints', duration:8, category:'Conditioning', intensity:'High', skills:['Conditioning','Footwork'], description:'Sprint intervals' },
  { id:'d11', name:'Cool Down Stretch', duration:10, category:'Cooldown', intensity:'Low', skills:['Conditioning'], description:'Static stretching for recovery' },
  { id:'d12', name:'Jump Serve Practice', duration:12, category:'Technical', intensity:'High', skills:['Serving'], description:'Jump serve toss and contact' },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════

let sections = [
  { id: 'warm', name: 'Warm-up', color: CATEGORY_COLORS.Warmup, items: [] },
  { id: 'main', name: 'Main Training', color: CATEGORY_COLORS.Tactical, items: [] },
  { id: 'cool', name: 'Cool Down', color: CATEGORY_COLORS.Cooldown, items: [] },
];

let modalSectionId = null;
let modalCatFilter = null;
let editingItemRef = null; // { sectionId, instanceId }
let dragState = null; // { sectionId, index }

function allItems() { return sections.flatMap(s => s.items); }

// ═══════════════════════════════════════════════════
// SECTIONS
// ═══════════════════════════════════════════════════

function addSection() {
  const name = prompt('Section name:');
  if (!name?.trim()) return;
  sections.push({ id: 'sec-' + Date.now(), name: name.trim(), color: '#666666', items: [] });
  renderAll();
}

function deleteSection(sectionId) {
  if (!confirm('Delete this section and its drills?')) return;
  sections = sections.filter(s => s.id !== sectionId);
  renderAll();
}

function renameSection(sectionId) {
  const sec = sections.find(s => s.id === sectionId);
  if (!sec) return;
  const name = prompt('New name:', sec.name);
  if (!name?.trim()) return;
  sec.name = name.trim();
  renderAll();
}

// ═══════════════════════════════════════════════════
// DRILL MODAL
// ═══════════════════════════════════════════════════

function openDrillModal(sectionId) {
  modalSectionId = sectionId;
  modalCatFilter = null;
  document.getElementById('drillModal').classList.remove('hidden');
  document.getElementById('modalSearch').value = '';
  renderModalCatTabs();
  renderModalDrills();
  document.getElementById('modalSearch').focus();
}

function closeDrillModal() {
  document.getElementById('drillModal').classList.add('hidden');
  modalSectionId = null;
}

function renderModalCatTabs() {
  const ct = document.getElementById('modalCatTabs');
  const allBtn = `<button onclick="setModalCat(null)" class="px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition-all ${
    !modalCatFilter ? 'bg-primary/15 text-primary border border-primary/30' : 'text-muted border border-border hover:text-foreground'
  }">All</button>`;
  ct.innerHTML = allBtn + CATEGORIES.map(c => `<button onclick="setModalCat('${c}')" class="px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition-all ${
    modalCatFilter === c ? 'text-white border' : 'text-muted border border-border hover:text-foreground'
  }" style="${modalCatFilter === c ? `background:${CATEGORY_COLORS[c]}30;border-color:${CATEGORY_COLORS[c]}60;color:${CATEGORY_COLORS[c]}` : ''}">${c}</button>`).join('');
}

function setModalCat(cat) { modalCatFilter = cat; renderModalCatTabs(); renderModalDrills(); }

function renderModalDrills() {
  const search = document.getElementById('modalSearch')?.value?.toLowerCase() || '';
  let drills = MOCK_DRILLS;
  if (modalCatFilter) drills = drills.filter(d => d.category === modalCatFilter);
  if (search) drills = drills.filter(d => d.name.toLowerCase().includes(search));

  document.getElementById('modalDrillList').innerHTML = drills.map(d => `
    <div class="group flex items-center gap-3 p-3 rounded-xl bg-surface/60 hover:bg-hover border border-transparent hover:border-border transition-all cursor-pointer fade-in"
         onclick="addDrillToSection('${d.id}')">
      <div class="w-1 h-10 rounded-full flex-shrink-0" style="background:${CATEGORY_COLORS[d.category]}"></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium text-foreground truncate">${d.name}</span>
          <span class="px-1.5 py-0.5 rounded text-[9px] font-medium" style="background:${INTENSITY_COLORS[d.intensity]}20;color:${INTENSITY_COLORS[d.intensity]}">${d.intensity}</span>
        </div>
        <div class="flex items-center gap-2 mt-0.5 text-[11px] text-muted">
          <span>${d.duration}m</span>
          <span>·</span>
          <span>${d.skills.slice(0,3).join(', ')}</span>
        </div>
      </div>
      <div class="w-7 h-7 rounded-full bg-primary/10 text-primary flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all flex-shrink-0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
  `).join('');
}

function addDrillToSection(drillId) {
  const drill = MOCK_DRILLS.find(d => d.id === drillId);
  if (!drill || !modalSectionId) return;
  const sec = sections.find(s => s.id === modalSectionId);
  if (!sec) return;
  sec.items.push({ ...drill, instanceId: 'ti-' + Date.now() + Math.random().toString(36).substr(2,5), notes: '' });
  renderAll();
  // Flash the section
  const secEl = document.querySelector(`[data-section="${modalSectionId}"]`);
  if (secEl) { secEl.classList.add('ring-2','ring-primary/30'); setTimeout(() => secEl.classList.remove('ring-2','ring-primary/30'), 600); }
}

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════

function formatTime(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }

function renderAll() {
  renderSections();
  renderStats();
  renderTimeBudget();
}

function renderTimeBudget() {
  const target = parseInt(document.getElementById('targetTime').value);
  const used = allItems().reduce((a,t) => a + t.duration, 0);
  const rem = target - used;
  const over = rem < 0;
  const pct = Math.min((used / target) * 100, 100);
  document.getElementById('usedTime').textContent = used;
  document.getElementById('usedTime').className = `text-lg font-bold ${over ? 'text-error' : 'text-foreground'}`;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressBar').className = `h-full rounded-full transition-all duration-500 ${over ? 'bg-error' : 'bg-accent'}`;
  document.getElementById('remainLabel').textContent = over ? `${Math.abs(rem)}m over` : `${rem}m left`;
  document.getElementById('remainLabel').className = `text-xs font-medium ${over ? 'text-error' : 'text-muted'}`;
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  let globalTime = 0;

  container.innerHTML = sections.map((sec, si) => {
    const secDuration = sec.items.reduce((a,t) => a + t.duration, 0);
    const secStart = formatTime(globalTime);

    const itemsHtml = sec.items.map((item, ii) => {
      const timeLabel = formatTime(globalTime);
      globalTime += item.duration;
      return `
        <div class="group flex items-center gap-3 p-3 rounded-xl bg-subtle/40 hover:bg-hover border border-transparent hover:border-border transition-all fade-in"
             draggable="true"
             ondragstart="onDragStart(event, '${sec.id}', ${ii})"
             ondragover="onDragOver(event)"
             ondragenter="onDragEnter(event, '${sec.id}', ${ii})"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event, '${sec.id}', ${ii})"
             ondragend="onDragEnd(event)">
          <!-- Drag handle -->
          <div class="flex-shrink-0 cursor-grab active:cursor-grabbing text-muted/30 hover:text-muted transition-colors">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
          </div>

          <!-- Time -->
          <span class="text-[10px] font-mono text-muted w-10 flex-shrink-0">${timeLabel}</span>

          <!-- Category dot -->
          <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${CATEGORY_COLORS[item.category]}"></div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-sm font-medium text-foreground truncate">${item.name}</span>
              <span class="px-1 py-0.5 rounded text-[9px] font-medium" style="background:${INTENSITY_COLORS[item.intensity]}20;color:${INTENSITY_COLORS[item.intensity]}">${item.intensity}</span>
            </div>
          </div>

          <!-- Duration (clickable) -->
          <button onclick="openDurEdit(event, '${sec.id}', '${item.instanceId}')"
            class="flex items-center gap-1 px-2 py-0.5 rounded-lg text-xs text-muted hover:text-primary hover:bg-primary/5 transition-all">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${item.duration}m
          </button>

          <!-- Remove -->
          <button onclick="removeItem('${sec.id}', '${item.instanceId}')"
            class="p-1 rounded-lg text-muted/30 hover:text-error hover:bg-error/10 opacity-0 group-hover:opacity-100 transition-all">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      `;
    }).join('');

    const sectionHtml = `
      <div class="rounded-2xl bg-surface/80 backdrop-blur-sm shadow-sm border border-border overflow-hidden transition-all" data-section="${sec.id}">
        <!-- Section Header -->
        <div class="flex items-center justify-between px-5 py-3 border-b border-border">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full" style="background:${sec.color}"></div>
            <h3 class="text-sm font-bold text-foreground uppercase tracking-wider">${sec.name}</h3>
            <span class="text-xs text-muted">${sec.items.length} drill${sec.items.length !== 1 ? 's' : ''}</span>
            <span class="text-xs text-muted">&middot;</span>
            <span class="text-xs text-muted">${secDuration}m</span>
            <span class="text-[10px] font-mono text-muted/50">(${secStart})</span>
          </div>
          <div class="flex items-center gap-1">
            <button onclick="openDrillModal('${sec.id}')" class="flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium text-primary hover:bg-primary/10 transition-all">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
            <button onclick="renameSection('${sec.id}')" class="p-1.5 rounded-lg text-muted/40 hover:text-foreground hover:bg-hover transition-all" title="Rename">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            ${sections.length > 1 ? `<button onclick="deleteSection('${sec.id}')" class="p-1.5 rounded-lg text-muted/40 hover:text-error hover:bg-error/10 transition-all" title="Delete section">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>` : ''}
          </div>
        </div>

        <!-- Items -->
        <div class="p-3 space-y-1.5 min-h-[48px]"
             ondragover="onSectionDragOver(event, '${sec.id}')"
             ondragenter="onSectionDragEnter(event, '${sec.id}')"
             ondragleave="onSectionDragLeave(event, '${sec.id}')"
             ondrop="onSectionDrop(event, '${sec.id}')">
          ${sec.items.length === 0 ? `
            <div class="text-center py-6 text-sm text-muted/40">
              <p>No drills yet</p>
              <button onclick="openDrillModal('${sec.id}')" class="text-primary text-xs hover:underline mt-1">+ Add drills</button>
            </div>
          ` : itemsHtml}
        </div>
      </div>
    `;

    globalTime = sections.slice(0, si + 1).reduce((a, s) => a + s.items.reduce((b, t) => b + t.duration, 0), 0);
    return sectionHtml;
  }).join('');
}

function renderStats() {
  const items = allItems();

  // Intensity chart
  const chart = document.getElementById('intensityChart');
  if (items.length === 0) { chart.innerHTML = '<span class="text-xs text-muted/30">No data</span>'; }
  else {
    const avg = (items.reduce((a,t) => a + INTENSITY_VAL[t.intensity], 0) / items.length).toFixed(1);
    document.getElementById('avgIntensity').textContent = `Avg: ${avg}/3`;
    chart.innerHTML = items.map(t => {
      const h = INTENSITY_VAL[t.intensity] / 3 * 100;
      return `<div class="flex-1 rounded-sm" style="height:${h}%;background:${INTENSITY_COLORS[t.intensity]}" title="${t.name}: ${t.intensity}"></div>`;
    }).join('');
  }

  // Category chart
  const catChart = document.getElementById('categoryChart');
  const catCounts = {};
  items.forEach(t => { catCounts[t.category] = (catCounts[t.category] || 0) + t.duration; });
  const totalDur = items.reduce((a,t) => a + t.duration, 0) || 1;
  catChart.innerHTML = Object.entries(catCounts).map(([cat, dur]) => {
    const pct = (dur / totalDur) * 100;
    return `<div class="rounded-sm" style="flex:${pct};height:100%;background:${CATEGORY_COLORS[cat]}" title="${cat}: ${dur}m (${Math.round(pct)}%)"></div>`;
  }).join('') || '<span class="text-xs text-muted/30">No data</span>';

  // Skills covered
  const skills = new Set();
  items.forEach(t => t.skills.forEach(s => skills.add(s)));
  document.getElementById('skillsCovered').innerHTML = skills.size === 0
    ? '<span class="text-xs text-muted/30">No data</span>'
    : Array.from(skills).map(s => `<span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-subtle border border-border text-foreground">${s}</span>`).join('');
}

function removeItem(sectionId, instanceId) {
  const sec = sections.find(s => s.id === sectionId);
  if (sec) sec.items = sec.items.filter(t => t.instanceId !== instanceId);
  renderAll();
}

// ═══════════════════════════════════════════════════
// DRAG & DROP (within and between sections)
// ═══════════════════════════════════════════════════

function onDragStart(e, sectionId, index) {
  dragState = { sectionId, index };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('drag-ghost'), 0);
}

function onDragOver(e) { e.preventDefault(); }

function onDragEnter(e, sectionId, index) {
  e.preventDefault();
  if (!dragState) return;
  if (dragState.sectionId === sectionId && dragState.index === index) return;
  e.currentTarget.classList.add('ring-1', 'ring-primary/40');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('ring-1', 'ring-primary/40');
}

function onDrop(e, targetSectionId, targetIndex) {
  e.preventDefault();
  e.currentTarget.classList.remove('ring-1', 'ring-primary/40');
  if (!dragState) return;

  const srcSec = sections.find(s => s.id === dragState.sectionId);
  const tgtSec = sections.find(s => s.id === targetSectionId);
  if (!srcSec || !tgtSec) return;

  const [moved] = srcSec.items.splice(dragState.index, 1);
  tgtSec.items.splice(targetIndex, 0, moved);
  dragState = null;
  renderAll();
}

function onDragEnd(e) {
  e.target.classList.remove('drag-ghost');
  dragState = null;
}

// Section-level drop (for dropping into empty sections or end of section)
function onSectionDragOver(e, sectionId) { e.preventDefault(); }
function onSectionDragEnter(e, sectionId) {
  e.preventDefault();
  if (!dragState || dragState.sectionId === sectionId) return;
  const secEl = document.querySelector(`[data-section="${sectionId}"]`);
  if (secEl) secEl.classList.add('section-drop-active');
}
function onSectionDragLeave(e, sectionId) {
  const secEl = document.querySelector(`[data-section="${sectionId}"]`);
  if (secEl) secEl.classList.remove('section-drop-active');
}
function onSectionDrop(e, sectionId) {
  e.preventDefault();
  const secEl = document.querySelector(`[data-section="${sectionId}"]`);
  if (secEl) secEl.classList.remove('section-drop-active');
  if (!dragState) return;

  const srcSec = sections.find(s => s.id === dragState.sectionId);
  const tgtSec = sections.find(s => s.id === sectionId);
  if (!srcSec || !tgtSec) return;

  const [moved] = srcSec.items.splice(dragState.index, 1);
  tgtSec.items.push(moved);
  dragState = null;
  renderAll();
}

// ═══════════════════════════════════════════════════
// DURATION EDIT
// ═══════════════════════════════════════════════════

function openDurEdit(e, sectionId, instanceId) {
  e.stopPropagation();
  editingItemRef = { sectionId, instanceId };
  const sec = sections.find(s => s.id === sectionId);
  const item = sec?.items.find(t => t.instanceId === instanceId);
  if (!item) return;
  document.getElementById('durInput').value = item.duration;
  const rect = e.target.getBoundingClientRect();
  const pop = document.getElementById('durEdit');
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.style.left = Math.max(8, rect.left - 50) + 'px';
  pop.classList.remove('hidden');
}

function adjDur(d) { const i = document.getElementById('durInput'); i.value = Math.max(1, parseInt(i.value) + d); }

function saveDurEdit() {
  if (!editingItemRef) return;
  const sec = sections.find(s => s.id === editingItemRef.sectionId);
  const item = sec?.items.find(t => t.instanceId === editingItemRef.instanceId);
  if (item) item.duration = parseInt(document.getElementById('durInput').value) || item.duration;
  closeDurEdit();
  renderAll();
}

function closeDurEdit() { document.getElementById('durEdit').classList.add('hidden'); editingItemRef = null; }

document.addEventListener('click', (e) => {
  const pop = document.getElementById('durEdit');
  if (!pop.classList.contains('hidden') && !pop.contains(e.target)) closeDurEdit();
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();
</script>
