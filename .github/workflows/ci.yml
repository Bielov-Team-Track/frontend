name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions: {}

jobs:
  # Build and test only (PRs)
  build-and-test:
    if: github.event_name == 'pull_request'
    uses: Bielov-Team-Track/devops/.github/workflows/build-frontend.yml@main
    permissions:
      contents: read
    with:
      push-docker-image: false

  # Build and push image (development branch) — staging env vars
  build-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: Bielov-Team-Track/devops/.github/workflows/build-frontend.yml@main
    permissions:
      contents: read
      packages: write
    with:
      push-docker-image: true
      environment: staging
    secrets: inherit

  # Build and push image (main branch) — production env vars
  build-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: Bielov-Team-Track/devops/.github/workflows/build-frontend.yml@main
    permissions:
      contents: read
      packages: write
    with:
      push-docker-image: true
      environment: production
    secrets: inherit

  # Deploy to staging server
  deploy-staging:
    needs: build-staging
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: frontend
      environment: staging
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_FINGERPRINT: ${{ secrets.SSH_FINGERPRINT }}

  # Deploy to production server
  deploy-production:
    needs: build-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: frontend
      environment: production
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_FINGERPRINT: ${{ secrets.SSH_FINGERPRINT }}
